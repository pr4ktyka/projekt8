<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d5016">
  <title>Offline - orzeszekstudies</title>
  <style>
    :root {
      --bg: #f4f7f1;
      --card: #ffffff;
      --text: #1f2a1f;
      --muted: #5f6b5f;
      --accent: #2d5016;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top left, #e8efe2 0%, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .card {
      max-width: 520px;
      width: 100%;
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(25, 35, 20, 0.12);
      padding: 28px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 28px;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.5;
    }
    a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Jesteś offline</h1>
    <p>Aplikacja jest dostępna na telefonie jako PWA, ale ta część wymaga połączenia z internetem.</p>
    <p>Po odzyskaniu sieci odśwież stronę lub wróć do <a href="/">strony głównej</a>.</p>
  </div>
</body>
</html>
