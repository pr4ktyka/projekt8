version: '3.8'

services:
  php:
    build: .
    container_name: orzeszekstudies-php
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mysql
    environment:
      MYSQL_HOST: mysql
      MYSQL_DB: orzeszekstudies
      MYSQL_USER: user
      MYSQL_PASSWORD: password

  mysql:
    image: mysql:8.0
    container_name: orzeszekstudies-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orzeszekstudies
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./app/database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data:
